name: Crud_contatos

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: contatos_sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "P@ssw0rd123!Secure"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd123!Secure' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - contatos_network
      
  backend:
    build:
      context: ../..
      dockerfile: Infrastructure/docker/backend/Dockerfile.backend
    container_name: contatos_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - contatos_network

  frontend:
    build:
      context: ../../../../Presetation/Project
      dockerfile: ../../back/Crud/Infrastructure/docker/frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: contatos_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - contatos_network

  nginx:
    image: nginx:alpine
    container_name: contatos_nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - contatos_network

volumes:
  sqldata:

networks:
  contatos_network:
    driver: bridge
