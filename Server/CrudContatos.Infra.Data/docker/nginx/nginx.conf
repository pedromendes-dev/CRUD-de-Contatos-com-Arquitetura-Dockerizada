# nginx.conf — Proxy reverso central (container contatos_nginx, porta 8082)
# Ponto de entrada unico da aplicacao: roteia /api/* para o backend e /* para o frontend.

user nginx;
worker_processes auto;          # ajusta automaticamente ao numero de CPUs
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;    # conexoes simultaneas por worker
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato de log com IP, metodo, status e user-agent
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Compressao gzip para reduzir trafego de JS, CSS e texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;

    server {
        listen 80;
        server_name _;

        # Rotas /api/* redirecionadas ao backend .NET (remove o prefixo /api antes de repassar)
        location /api/ {
            proxy_pass http://backend:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;            # sem buffer — resposta enviada diretamente ao cliente
        }

        # Todo o resto vai para o container do frontend React
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
