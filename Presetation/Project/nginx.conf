# nginx.conf — Config interna do container frontend (porta 80)
# Serve os arquivos estaticos do React e trata o SPA routing.
# Tambem faz proxy de /api/* para o backend quando acessado diretamente (porta 3000).

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;   # pasta onde o Vite gerou o build (dist/)
  index index.html;

  # SPA routing: qualquer rota que nao seja um arquivo existente cai no index.html,
  # deixando o React Router tratar a navegacao no cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy de /api/* para o backend — util ao acessar o frontend diretamente (porta 3000),
  # fora do nginx central. Em producao, esse roteamento e feito pelo nginx central (porta 8082).
  location /api/ {
    proxy_pass http://backend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
