<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fundo azul arredondado -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Logo SmartReg (rede de nós) reduzida e centrada, em branco -->
  <!-- Círculo externo -->
  <circle cx="32" cy="32" r="26" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>

  <!-- Nó central -->
  <circle cx="32" cy="32" r="5" fill="white"/>

  <!-- Nós nos cantos -->
  <circle cx="20" cy="20" r="3.5" fill="white"/>
  <circle cx="44" cy="20" r="3.5" fill="white"/>
  <circle cx="20" cy="44" r="3.5" fill="white"/>
  <circle cx="44" cy="44" r="3.5" fill="white"/>

  <!-- Linhas de conexão -->
  <line x1="32" y1="32" x2="20" y2="20" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="32" x2="44" y2="20" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="32" x2="20" y2="44" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="32" x2="44" y2="44" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <!-- Linhas horizontais -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="20" y1="44" x2="44" y2="44" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
