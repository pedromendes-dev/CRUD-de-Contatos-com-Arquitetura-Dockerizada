<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo externo -->
  <circle cx="50" cy="50" r="45" stroke="#2563eb" stroke-width="3" fill="none"/>

  <!-- Nó central -->
  <circle cx="50" cy="50" r="8" fill="#2563eb"/>

  <!-- Nós nos cantos -->
  <circle cx="30" cy="30" r="6" fill="#2563eb"/>
  <circle cx="70" cy="30" r="6" fill="#2563eb"/>
  <circle cx="30" cy="70" r="6" fill="#2563eb"/>
  <circle cx="70" cy="70" r="6" fill="#2563eb"/>

  <!-- Linhas de conexão -->
  <line x1="50" y1="50" x2="30" y2="30" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="70" y2="30" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="30" y2="70" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="70" y2="70" stroke="#2563eb" stroke-width="2" opacity="0.6"/>

  <!-- Linhas horizontais -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="70" x2="70" y2="70" stroke="#2563eb" stroke-width="2" opacity="0.4"/>

  <!-- Elementos cardeais -->
  <rect x="20" y="47" width="12" height="2" fill="#2563eb" opacity="0.5" rx="1"/>
  <rect x="68" y="47" width="12" height="2" fill="#2563eb" opacity="0.5" rx="1"/>
  <rect x="47" y="20" width="2"  height="12" fill="#2563eb" opacity="0.5" rx="1"/>
  <rect x="47" y="68" width="2"  height="12" fill="#2563eb" opacity="0.5" rx="1"/>
</svg>
