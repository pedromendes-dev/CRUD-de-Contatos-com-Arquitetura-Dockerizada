services:
  - type: web
    name: crud-backend
    runtime: docker
    dockerfilePath: ./back/Crud/Infrastructure/docker/backend/Dockerfile
    dockerContext: ./back
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
    port: 8080
    healthCheckPath: /health
    
  - type: web
    name: crud-frontend
    runtime: docker
    dockerfilePath: ./Presetation/Project/Dockerfile
    dockerContext: ./Presetation/Project
    envVars:
      - key: VITE_API_URL
        value: https://crud-backend.onrender.com/api
    port: 80
    
  - type: web
    name: crud-nginx
    image: nginx:alpine
    envVars:
      - key: BACKEND_HOST
        value: crud-backend
      - key: FRONTEND_HOST
        value: crud-frontend
    port: 80
    routes:
      - path: /api
        service: crud-backend
        port: 8080
      - path: /
        service: crud-frontend
        port: 80
