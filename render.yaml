services:
  - type: web
    name: crud-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        fromDatabase:
          name: crud-postgres
          property: connectionString
    port: 8080
    
  - type: web
    name: crud-frontend
    runtime: docker
    dockerfilePath: ./Presetation/Project/Dockerfile
    dockerContext: ./Presetation/Project
    envVars:
      - key: VITE_API_URL
        value: https://crud-backend.onrender.com/api
    port: 80
    
  - type: web
    name: crud-nginx
    image: pedrom21/crud-nginx:latest
    port: 80
